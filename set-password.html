<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEDRUS — Finalisation du compte</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' font-weight='bold' fill='%233E9364'>C</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/styles.css">
    <script>
        tailwind.config = { theme: { extend: { colors: {
            'cedrus': { 700:'#357A56', 600:'#3E9364', 500:'#4FA36F', 200:'#BFE6AE' },
            'ink':'#0B1420', 'muted':'#6B7280', 'paper':'#F8FAF9', 'gold':'#D4A853'
        }, fontFamily: { 'playfair':['Playfair Display','serif'], 'inter':['Inter','sans-serif'] } } } }
    </script>
    <style>
        .login-input { width:100%; padding:14px 20px 14px 48px; border:2px solid #E5E7EB; border-radius:12px; font-size:1rem; transition:all 0.3s; background:white; }
        .login-input:focus { outline:none; border-color:#3E9364; box-shadow:0 0 0 3px rgba(62,147,100,.1); }
        .input-wrapper { position:relative; }
        .input-icon { position:absolute; left:16px; top:50%; transform:translateY(-50%); color:#9CA3AF; }
        .btn-submit { width:100%; padding:14px; background:linear-gradient(135deg,#3E9364,#4FA36F); color:white; border:none; border-radius:12px; font-weight:500; cursor:pointer; box-shadow:0 4px 12px rgba(62,147,100,.2); transition:all .3s; }
        .btn-submit:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(62,147,100,.3); }
        .btn-submit:disabled { opacity:.5; cursor:not-allowed; transform:none; }
    </style>
</head>
<body class="font-inter text-ink min-h-screen bg-paper flex items-center justify-center p-6">

<div class="w-full max-w-md">
    <div class="text-center mb-8">
        <img src="cedrus.png" alt="CEDRUS" class="h-14 mx-auto mb-6">
        <h1 class="text-2xl font-playfair font-bold text-ink mb-2">Bienvenue sur votre espace</h1>
        <p class="text-muted text-sm">Définissez votre mot de passe pour activer votre compte.</p>
    </div>

    <form id="pwForm" onsubmit="submitPassword(event)" class="space-y-5">
        <div>
            <label class="block text-sm font-medium text-ink mb-2">Nouveau mot de passe</label>
            <div class="input-wrapper">
                <svg class="input-icon w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/></svg>
                <input type="password" class="login-input" id="pw1" placeholder="Au moins 8 caractères" minlength="8" required>
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-ink mb-2">Confirmer le mot de passe</label>
            <div class="input-wrapper">
                <svg class="input-icon w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/></svg>
                <input type="password" class="login-input" id="pw2" placeholder="Retapez le mot de passe" minlength="8" required>
            </div>
        </div>

        <div id="errBox" class="hidden text-center text-sm text-red-500 bg-red-50 p-3 rounded-lg"></div>
        <button type="submit" class="btn-submit" id="submitBtn">Activer mon compte</button>
    </form>

    <div class="mt-8 text-center">
        <a href="espace-client.html" class="text-sm text-muted hover:text-ink transition-colors">← Retour à la connexion</a>
    </div>
</div>

<script>
(function extractTokenFromHash() {
    if (!location.hash || location.hash.indexOf('access_token=') === -1) return;
    var params = {};
    location.hash.slice(1).split('&').forEach(function(kv) {
        var p = kv.split('='); params[p[0]] = decodeURIComponent(p[1] || '');
    });
    if (params.access_token) sessionStorage.setItem('cedrus_invite_token', params.access_token);
    history.replaceState(null, '', location.pathname);
})();

async function submitPassword(e) {
    e.preventDefault();
    var err = document.getElementById('errBox');
    err.classList.add('hidden');
    var pw1 = document.getElementById('pw1').value;
    var pw2 = document.getElementById('pw2').value;
    if (pw1 !== pw2) {
        err.textContent = 'Les deux mots de passe ne correspondent pas.';
        err.classList.remove('hidden');
        return;
    }
    var token = sessionStorage.getItem('cedrus_invite_token');
    if (!token) {
        err.textContent = "Lien d'invitation invalide ou expiré. Demandez à CEDRUS de vous renvoyer un email.";
        err.classList.remove('hidden');
        return;
    }
    var btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Activation…';
    try {
        var res = await fetch('/api/client/set-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ access_token: token, password: pw1 })
        });
        var data = await res.json();
        if (!res.ok) throw new Error(data.error || 'unexpected');
        sessionStorage.removeItem('cedrus_invite_token');
        localStorage.setItem('cedrus_client_token', data.access_token);
        // Récupère les sociétés liées et redirige
        try {
            const r = await fetch('/api/client/my-societies', {
                headers: { Authorization: 'Bearer ' + data.access_token }
            });
            const sd = await r.json();
            const societies = sd.societies || [];
            if (societies.length === 1) {
                localStorage.setItem('cedrus_active_client_id', societies[0].id);
                localStorage.setItem('cedrus_active_client_name', societies[0].raison_sociale);
                window.location.href = 'dashboard-client.html';
            } else if (societies.length > 1) {
                window.location.href = 'choix-dossier.html';
            } else {
                window.location.href = 'espace-client.html';
            }
        } catch {
            window.location.href = 'espace-client.html';
        }
    } catch (ex) {
        err.textContent = 'Activation impossible : ' + (ex.message || ex);
        err.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Activer mon compte';
    }
}
</script>
</body>
</html>
